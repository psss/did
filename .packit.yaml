actions:
  create-archive:
  - make tarball
  get-current-version:
  - make version

srpm_build_deps:
  - make
  - python3-docutils

jobs:
- job: copr_build
  trigger: pull_request
  targets:
  - fedora-all
  - epel-9
  - epel-10
  enable_net: False

- job: tests
  trigger: pull_request
  targets:
  - fedora-all
  - epel-9
  - epel-10

- job: copr_build
  trigger: commit
  branch: main
  targets:
  - fedora-all
  - epel-9
  - epel-10
  enable_net: False
  list_on_homepage: True
  preserve_project: True
  owner: psss
  project: did
